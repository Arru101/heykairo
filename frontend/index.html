<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Kairo – Cute, Anonymous & Military-grade encrypted real-time communications. No data stored." />
    <meta name="theme-color" content="#09090b" />
    <title>Kairo · Secure & Cute Chat</title>
    <!-- Prevent browser from caching sensitive pages -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Prevent image drag and text selection on UI chrome */
      body { 
        -webkit-user-select: none; 
        user-select: none; 
        overscroll-behavior: none;
      }
      /* Re-enable text selection only in chat messages and inputs */
      p, textarea, input, .mono-id { 
        -webkit-user-select: text; 
        user-select: text; 
      }
      img {
        -webkit-user-drag: none;
        user-drag: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
