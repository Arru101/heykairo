<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Kairo – Military-grade encrypted real-time communications. No login. No data stored." />
    <meta name="theme-color" content="#09090b" />
    <title>Kairo | Secure Network</title>
    <!-- Prevent browser from caching sensitive pages -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <style>
      /* Prevent image drag on the entire page */
      img { -webkit-user-drag: none; user-drag: none; pointer-events: none; }
      /* Prevent text selection on UI chrome */
      body { -webkit-user-select: none; user-select: none; }
      /* Re-enable text selection only in chat messages and inputs */
      p, textarea, input { -webkit-user-select: text; user-select: text; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
