<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="kGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="shieldClip">
      <path d="M256 32 L432 96 L432 256 C432 358 256 480 256 480 C256 480 80 358 80 256 L80 96 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#09090b" rx="80"/>

  <!-- Outer glow ring -->
  <path d="M256 32 L432 96 L432 256 C432 358 256 480 256 480 C256 480 80 358 80 256 L80 96 Z"
    fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.25" filter="url(#outerGlow)"/>

  <!-- Shield body -->
  <path d="M256 44 L420 104 L420 256 C420 350 256 468 256 468 C256 468 92 350 92 256 L92 104 Z"
    fill="url(#shieldGrad)" opacity="0.15"/>

  <!-- Shield outline -->
  <path d="M256 44 L420 104 L420 256 C420 350 256 468 256 468 C256 468 92 350 92 256 L92 104 Z"
    fill="none" stroke="url(#kGrad)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Inner shield highlight -->
  <path d="M256 70 L396 122 L396 256 C396 336 256 440 256 440 C256 440 116 336 116 256 L116 122 Z"
    fill="url(#glowGrad)" opacity="0.3"/>

  <!-- Circuit board decorative lines -->
  <g stroke="#3b82f6" stroke-width="1" opacity="0.2" fill="none">
    <line x1="140" y1="160" x2="180" y2="160"/>
    <line x1="180" y1="160" x2="180" y2="140"/>
    <line x1="332" y1="160" x2="372" y2="160"/>
    <line x1="332" y1="160" x2="332" y2="140"/>
    <line x1="140" y1="360" x2="180" y2="360"/>
    <line x1="180" y1="360" x2="180" y2="380"/>
    <line x1="332" y1="360" x2="372" y2="360"/>
    <line x1="332" y1="360" x2="332" y2="380"/>
    <!-- Node dots -->
    <circle cx="180" cy="140" r="3" fill="#3b82f6" opacity="0.5"/>
    <circle cx="332" cy="140" r="3" fill="#3b82f6" opacity="0.5"/>
    <circle cx="180" cy="380" r="3" fill="#3b82f6" opacity="0.5"/>
    <circle cx="332" cy="380" r="3" fill="#3b82f6" opacity="0.5"/>
  </g>

  <!-- K lettermark - main symbol -->
  <g filter="url(#glow)">
    <!-- K vertical stroke -->
    <rect x="196" y="168" width="28" height="176" rx="6" fill="url(#kGrad)"/>
    <!-- K upper arm -->
    <path d="M224 256 L316 168 L288 168 L210 232 Z" fill="url(#kGrad)"/>
    <!-- K lower arm -->
    <path d="M224 256 L316 344 L288 344 L210 280 Z" fill="url(#kGrad)"/>
  </g>

  <!-- Subtle inner light -->
  <ellipse cx="256" cy="200" rx="80" ry="40" fill="#3b82f6" opacity="0.05"/>
</svg>